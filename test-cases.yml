- summary: |
    Добавление одного товара в корзину и продолжение просмотра каталога
  requirement: |
    Пользователь должен иметь возможность добавить товар в корзину и продолжить выбирать товары в каталоге
  prerequisites: |
    Открыта страница каталога товаров. Товары загружены и доступны для добавления
  test-data: |
    Empty
  steps:
    - Находим первый по счету товар на странице каталога
    - Нажимаем кнопку "Добавить в корзину"
    - Проверяем увеличение счетчика товаров в корзине в правом верхнем углу (должен измениться с 0 на 1)
    - Продолжаем просмотр каталога
    - Находим второй по счету товар 
    - Нажимаем кнопку "Добавить в корзину"
    - Проверяем увеличение счетчика (должен измениться с 1 на 2)
  expected-result: |
    Оба товара успешно добавлены в корзину. Счетчик в шапке показывает "2". 
    Пользователь остается на странице каталога с возможностью продолжить выбор товаров

- summary: |
    Продолжение покупок из страницы корзины
  requirement: |
    Пользователь должен иметь возможность вернуться в каталог и продолжить выбирать товары, не потеряв уже добавленные
  prerequisites: |
    Открыта страница корзины. В корзине находятся 2 товара
  test-data: |
    Empty
  steps:
    - Нажимаем кнопку "Продолжить покупки" или "Вернуться в каталог"
    - Проверяем загрузку страницы каталога
    - Проверяем, что счетчик корзины все еще показывает 2 товара
    - Находим новый товар 
    - Нажимаем кнопку "Добавить в корзину"
    - Проверяем увеличение счетчика (должен измениться с 2 на 3)
    - Нажимаем на иконку "Корзина"
  expected-result: |
    Пользователь вернулся в каталог. Товары остались в корзине. 
    После добавления нового товара в корзине находятся 3 товара 

- summary: |
    Оформление заказа с переходом на страницу оплаты
  requirement: |
    Пользователь должен иметь возможность оформить заказ из корзины и перейти на страницу оплаты
  prerequisites: |
    Открыта страница корзины. В корзине находятся товары 2 любых товара.
  test-data: |
    Empty
  steps:
    - Проверяем наличие кнопки "Оформить заказ"
    - Нажимаем кнопку "Оформить заказ"
    - Проверяем переход на страницу оплаты/оформления
    - Проверяем отображение список товаров на странице оплаты
    - Проверяем отображение корректной итоговой суммы она должна соответсвовать сумме в корзине 
    - Проверяем отображение всех необходимых полей формы оплаты
  expected-result: |
    Пользователь успешно перешел на страницу оплаты. Все товары и сумма отображаются корректно. 
    Форма оплаты содержит необходимые поля для заполнения

- summary: |
    Проверка хранения корзины в localStorage/sessionStorage
  requirement: |
    Корзина должна храниться в сессии браузера 
  prerequisites: |
    В корзину добавлены товары. Браузер открыт с инструментами разработчика (DevTools)
  test-data: |
    Empty
  steps:
    - Добавляем любые товары в корзину
    - Открываем DevTools (F12)
    - Переходим на вкладку "Application" или "Storage"
    - Проверяем наличие данных в sessionStorage
    - Проверяем структуру хранящихся данных
    - Обновляем страницу (F5)
    - Проверяем, что данные все еще в sessionStorage
  expected-result: |
    Данные корзины хранятся в sessionStorage браузера. После обновления страницы данные сохраняются. 
    
    


    
