bugreports:
- summary: |
    Сбрасывается язык
  environment: |
    Google Chrome   144.0.7559.97 (официальная сборка) (64 бит)
    Windows 10 22H2 (сборка 19045.6456)
  steps-to-reproduce: |
    1. Зайти на страницу https://products-store.hexlet.app/
    2. Нажать "Language"
    3. Выбрать Русский язык
    4. Нажать "Магазин"
  expected-result: |
    Страница остаётся на русском языке
  actual-result: |
    Страница переводится обратно на английский язык 

- summary: |
    Не работает очистка корзины
  environment: |
    Google Chrome   144.0.7559.97 (официальная сборка) (64 бит)
    Windows 10 22H2 (сборка 19045.6456)
  steps-to-reproduce: |
    1. Зайти на страницу https://products-store.hexlet.app/
    2. Нажать "В корзину" на любом товаре 
    3. Нажать "Корзина"
    4. Нажать "Очистить корзину"
    5. Нажать "Магазин"
  expected-result: |
    Откроется главная страница при этом корзина должна быть пуста 
  actual-result: |
    Открывается главная страница и удаленные товары возвращаются в корзину

    
- summary: |
    Пустой пункт в категориях
  environment: |
    Google Chrome   144.0.7559.97 (официальная сборка) (64 бит)
    Windows 10 22H2 (сборка 19045.6456)
  steps-to-reproduce: |
    1. Зайти на страницу https://products-store.hexlet.app/
    2. Нажать "Категории"
    3. Выбрать пункт без имени
  expected-result: |
    Такого пункта не должно быть 
  actual-result: |
    При выборе пустой категории пропадает кнопка "Следующая"

